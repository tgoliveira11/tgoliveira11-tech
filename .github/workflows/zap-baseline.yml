name: OWASP ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment URL to scan (passive baseline only)
        required: false
        default: https://tgoliveira11-tech.vercel.app
  schedule:
    - cron: "0 7 * * 0"

permissions:
  contents: read
  actions: read

concurrency:
  group: zap-baseline
  cancel-in-progress: false

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target || 'https://tgoliveira11-tech.vercel.app' }}
          rules_file_name: .zap/rules.tsv
          cmd_options: >-
            -a -j
            -z "-config spider.maxDepth=2 -config spider.scope.ignore=.*(/admin|/api/account|/api/auth|/api/admin).*" 
        env:
          ZAP_AUTH_HEADER_VALUE: ""

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          if-no-files-found: warn
          retention-days: 30

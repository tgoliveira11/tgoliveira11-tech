services:
  postgres:
    image: postgres:16
    container_name: postforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postforge
      POSTGRES_PASSWORD: postforge
      POSTGRES_DB: postforge
    ports:
      - "5432:5432"
    volumes:
      - postforge_postgres_data:/var/lib/postgresql/data

volumes:
  postforge_postgres_data: